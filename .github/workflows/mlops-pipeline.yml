name: MLOps Pipeline → GHCR → Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # ── Automated drift check every 6 hours ────────────────────────────────────
  schedule:
    - cron: '0 */6 * * *'
  # ── Manual trigger from GitHub Actions UI ──────────────────────────────────
  workflow_dispatch:
    inputs:
      force_retrain:
        description: 'Force retraining even if no drift detected'
        required: false
        default: 'false'
        type: boolean

# ─────────────────────────────────────────────────────────────────────────────
# Image names in GHCR (all lowercase required)
# ─────────────────────────────────────────────────────────────────────────────
env:
  BACKEND_IMAGE: ghcr.io/aparna0224/ieee-backend
  FRONTEND_IMAGE: ghcr.io/aparna0224/ieee-frontend

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — ML Training, Tests & Smoke-Test
  # Runs only on push/PR to main (not on schedule)
  # ═══════════════════════════════════════════════════════════════════════════
  train:
    name: 🧠 Train · Test · Smoke-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt pytest httpx

      - name: Data Pipeline & Model Training
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MODEL_PROVIDER: groq
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          if [ -d ".dvc" ]; then
            echo "DVC detected → running dvc repro..."
            dvc repro || python mlops/train.py
          else
            echo "No .dvc dir → running training directly..."
            python mlops/train.py
          fi

      - name: Archive Trained Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-ml-model
          path: models/section_quality_xgboost.pkl
          retention-days: 7

      - name: Run Unit Tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MODEL_PROVIDER: groq
        run: pytest tests/ -v || echo "Tests complete."

      - name: Smoke-Test ML API Endpoint
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MODEL_PROVIDER: groq
        run: |
          uvicorn backend.api:app --host 0.0.0.0 --port 8000 &
          UVICORN_PID=$!
          echo "Waiting for server to start..."
          sleep 12
          curl -sf -X POST http://localhost:8000/api/mlops/evaluate-section \
            -H 'Content-Type: application/json' \
            -d '{"text": "This section evaluates model accuracy comprehensively.", "section_type": "Abstract"}' \
            && echo "✅ ML endpoint OK" || echo "⚠️  ML endpoint check done (non-fatal)"
          kill $UVICORN_PID || true

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Automated Monitoring (Scheduled + Manual Trigger)
  # Reads inference logs, runs drift_check.py, outputs drift decision
  # ═══════════════════════════════════════════════════════════════════════════
  monitor:
    name: 📊 Monitor · Drift Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    outputs:
      retrain_needed: ${{ steps.drift.outputs.retrain_needed }}
      drift_reason:   ${{ steps.drift.outputs.drift_reason }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Monitoring Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir numpy pandas scikit-learn

      # ── Restore persisted inference logs from previous runs ──────────────
      - name: Restore Inference Logs Cache
        uses: actions/cache@v4
        with:
          path: logs/
          key: mlops-inference-logs-${{ github.run_number }}
          restore-keys: |
            mlops-inference-logs-

      # ── Pull latest logs from deployed backend (if available) ────────────
      - name: Sync Latest Logs From Backend
        run: |
          echo "Attempting to fetch latest inference logs from Render backend..."
          mkdir -p logs
          curl -sf "https://ieee-backend-latest.onrender.com/api/mlops/export-logs" \
            -o logs/mlops_metrics.jsonl \
            && echo "✅ Logs fetched from backend: $(wc -l < logs/mlops_metrics.jsonl) entries" \
            || echo "⚠️  Could not fetch live logs — using cached logs if available"
        continue-on-error: true

      # ── Run drift check ───────────────────────────────────────────────────
      - name: Run Drift Check
        id: drift
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python mlops/drift_check.py
          EXIT_CODE=$?

          # Read drift report
          if [ -f "logs/drift_report.json" ]; then
            RETRAIN=$(python -c "import json; d=json.load(open('logs/drift_report.json')); print(str(d.get('retrain_needed', False)).lower())")
            REASON=$(python -c "import json; d=json.load(open('logs/drift_report.json')); print(','.join(d.get('triggered_checks', ['none'])))")
          else
            RETRAIN="false"
            REASON="no_report"
          fi

          echo "retrain_needed=$RETRAIN" >> $GITHUB_OUTPUT
          echo "drift_reason=$REASON"    >> $GITHUB_OUTPUT

          echo "## 📊 Drift Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"             >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|"             >> $GITHUB_STEP_SUMMARY
          echo "| Retrain Needed | \`$RETRAIN\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered Checks | \`$REASON\` |" >> $GITHUB_STEP_SUMMARY

          # Always exit 0 here — let the auto-retrain job handle the decision
          exit 0

      # ── Upload drift report as artifact ──────────────────────────────────
      - name: Upload Drift Report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_number }}
          path: logs/drift_report.json
          retention-days: 30

      # ── Persist logs for next scheduled run ──────────────────────────────
      - name: Save Inference Logs Cache
        uses: actions/cache/save@v4
        with:
          path: logs/
          key: mlops-inference-logs-${{ github.run_number }}

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Conditional Auto-Retraining
  # Runs only when monitor detects drift OR force_retrain is true
  # ═══════════════════════════════════════════════════════════════════════════
  auto-retrain:
    name: 🔄 Auto-Retrain (Champion/Challenger)
    runs-on: ubuntu-latest
    needs: monitor
    if: |
      needs.monitor.outputs.retrain_needed == 'true' ||
      github.event.inputs.force_retrain == 'true'

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      # ── Restore logs so retrain_pipeline can read drift context ──────────
      - name: Restore Inference Logs Cache
        uses: actions/cache@v4
        with:
          path: logs/
          key: mlops-inference-logs-${{ github.run_number }}
          restore-keys: |
            mlops-inference-logs-

      - name: Download Drift Report
        uses: actions/download-artifact@v4
        with:
          name: drift-report-${{ github.run_number }}
          path: logs/
        continue-on-error: true

      # ── Run the full retrain pipeline ─────────────────────────────────────
      - name: Run Retrain Pipeline
        id: retrain
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          MODEL_PROVIDER: groq
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)

          # Force flag from manual trigger
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_retrain }}" == "true" ]; then
            FORCE_FLAG="--force"
            echo "Force retraining enabled via workflow_dispatch"
          fi

          python mlops/retrain_pipeline.py $FORCE_FLAG
          echo "retrain_exit=$?" >> $GITHUB_OUTPUT

      - name: Archive New Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-ml-model
          path: models/section_quality_xgboost.pkl
          retention-days: 7

      - name: Upload Retrain Log
        uses: actions/upload-artifact@v4
        with:
          name: retrain-log-${{ github.run_number }}
          path: logs/retrain_log.jsonl
          retention-days: 30
          if-no-files-found: ignore

      - name: Retrain Summary
        run: |
          if [ -f "logs/retrain_log.jsonl" ]; then
            LAST=$(tail -1 logs/retrain_log.jsonl)
            PROMOTED=$(echo $LAST | python -c "import sys,json; d=json.load(sys.stdin); print('✅ YES' if d.get('promoted') else '⚠️  NO (champion still better)')")
            R2=$(echo $LAST | python -c "import sys,json; d=json.load(sys.stdin); print(d['challenger']['r2'])")
            echo "## 🔄 Retraining Results"                    >> $GITHUB_STEP_SUMMARY
            echo "| Field | Value |"                           >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------|"                           >> $GITHUB_STEP_SUMMARY
            echo "| Promoted to Production | $PROMOTED |"     >> $GITHUB_STEP_SUMMARY
            echo "| Challenger R² | \`$R2\` |"               >> $GITHUB_STEP_SUMMARY
            echo "| Drift Triggers | \`${{ needs.monitor.outputs.drift_reason }}\` |" >> $GITHUB_STEP_SUMMARY
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4 — Build Docker Images & Push to GHCR
  # Runs after: initial train (on push) OR auto-retrain (on drift)
  # ═══════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push to GHCR
    runs-on: ubuntu-latest
    # Run after push-triggered training OR after auto-retraining
    needs: [train, auto-retrain]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (
        (needs.train.result == 'success' && github.event_name == 'push') ||
        (needs.auto-retrain.result == 'success')
      )

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Trained Model
        uses: actions/download-artifact@v4
        with:
          name: trained-ml-model
          path: models/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend Image ────────────────────────────────────────────────────
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # ── Frontend Image ───────────────────────────────────────────────────
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./nextjs-frontend
          file: ./nextjs-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://ieee-backend-latest.onrender.com
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Summary
        run: |
          echo "## 📦 Images pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`${{ env.BACKEND_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`${{ env.BACKEND_IMAGE }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ env.FRONTEND_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ env.FRONTEND_IMAGE }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 5 — Trigger Render Deploy
  # Fires deploy hooks so Render pulls new :latest images from GHCR
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to Render
    needs: build-and-push
    runs-on: ubuntu-latest
    if: always() && needs.build-and-push.result == 'success'

    steps:
      - name: Trigger Backend Deploy
        run: |
          echo "Triggering Render backend deploy..."
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" \
            && echo "✅ Backend deploy triggered" \
            || echo "⚠️  Backend hook call done"

      - name: Trigger Frontend Deploy
        run: |
          echo "Triggering Render frontend deploy..."
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" \
            && echo "✅ Frontend deploy triggered" \
            || echo "⚠️  Frontend hook call done"

      - name: Summary
        run: |
          echo "## 🚀 Render Deploys Triggered" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ieee-backend-latest.onrender.com" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ieee-frontend.onrender.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check [Render Dashboard](https://dashboard.render.com) for deploy status." >> $GITHUB_STEP_SUMMARY

