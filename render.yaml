# render.yaml — Render Blueprint
# Defines both backend and frontend services deployed from GHCR images.
# Render pulls the :latest image whenever a deploy is triggered.
#
# HOW TO USE:
#   1. Push this file to your GitHub repo root.
#   2. In Render Dashboard → New → Blueprint → connect your repo.
#   3. Set GROQ_API_KEY and NEXT_PUBLIC_API_URL manually in each service's
#      Environment tab (marked as sync: false below).

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: ieee-backend
    runtime: image
    image:
      url: ghcr.io/aparna0224/ieee-backend:latest
    # Render's free tier uses port from $PORT env var automatically
    healthCheckPath: /api/health
    envVars:
      - key: MODEL_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_FALLBACK_MODELS
        value: llama-3.3-70b-versatile,llama-3.1-8b-instant
      - key: DEFAULT_MODEL
        value: llama-3.1-8b-instant
      - key: PYTHONUNBUFFERED
        value: "1"
      # ⚠️  Set this manually in the Render Dashboard — never commit API keys!
      - key: GROQ_API_KEY
        sync: false

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  - type: web
    name: ieee-frontend
    runtime: image
    image:
      url: ghcr.io/aparna0224/ieee-frontend:latest
    envVars:
      - key: NODE_ENV
        value: production
      # ⚠️  Set this to your backend's Render URL after backend is live:
      #     e.g. https://ieee-backend-latest.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false
